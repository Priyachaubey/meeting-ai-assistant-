apiVersion: apps/v1
kind: Deployment
metadata: { name: convopilot-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: convopilot-api } }
  template:
    metadata: { labels: { app: convopilot-api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/convopilot-api:latest
          ports: [{ containerPort: 8000 }]
          envFrom: [{ secretRef: { name: convopilot-secrets } }]
---
apiVersion: v1
kind: Service
metadata: { name: convopilot-api }
spec:
  selector: { app: convopilot-api }
  ports: [{ port: 80, targetPort: 8000 }]
