services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: convopilot
      POSTGRES_PASSWORD: convopilot
      POSTGRES_DB: convopilot
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports: ["6333:6333"]
    volumes: ["qdrant:/qdrant/storage"]
  api:
    build: ./apps/api
    env_file: .env
    depends_on: [postgres, redis, qdrant]
    ports: ["8000:8000"]
  web:
    build: ./apps/web
    env_file: .env
    depends_on: [api]
    ports: ["3000:3000"]
volumes:
  pgdata:
  qdrant:
